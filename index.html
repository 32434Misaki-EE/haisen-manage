<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンセント負荷マップ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toolbar">
        <div class="tool-group">
            <button id="add-wall-outlet" class="tool-btn" title="出力のみ">
                <span class="icon"><img src="svgs/line_start_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" style="width: 24px; height: 24px;" /></span>
            </button>
            <button id="add-power-strip" class="tool-btn" title="入力と出力">
                <span class="icon"><img src="svgs/vital_signs_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" style="width: 24px; height: 24px;" /></span>
            </button>
            <button id="add-device" class="tool-btn" title="入力のみ">
                <span class="icon"><img src="svgs/line_end_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" style="width: 24px; height: 24px;" /></span>
            </button>
        </div>
    </div>

    <div id="workspace-controls">
        <div id="import-export-controls" aria-label="ファイル管理">
            <button id="import-btn" class="tool-btn" title="インポート">
                <span class="icon"><img src="svgs/import_24dp_555555_FILL1_wght400_GRAD0_opsz24.svg" style="width: 24px; height: 24px;" /></span>
            </button>
            <button id="export-btn" class="tool-btn" title="エクスポート">
                <span class="icon"><img src="svgs/export_24dp_555555_FILL1_wght400_GRAD0_opsz24.svg" style="width: 24px; height: 24px;" /></span>
            </button>
        </div>

        <div id="zoom-controls" aria-label="ズーム">
            <button id="zoom-in" class="tool-btn" title="拡大">＋</button>
            <button id="zoom-out" class="tool-btn" title="縮小">－</button>
        </div>
    </div>

    <div id="workspace-container">
        <!-- Background Grid -->
        <div id="workspace-bg"></div>
        <!-- SVG layer for cables -->
        <svg id="connections-layer"></svg>
        <!-- Nodes will be added here -->
        <div id="nodes-layer"></div>
    </div>

    <!-- Templates -->
    <template id="tpl-wall-outlet">
        <div class="node wall-outlet" data-type="outlet">
            <div class="node-header">
                <div class="header-left">
                    <span class="icon node-icon"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#555"><path d="M180-380q-42 0-71-29t-29-71q0-42 29-71t71-29q31 0 56 17t36 43h608v80H272q-11 26-36 43t-56 17Z"/></svg></span>
                    <input type="text" class="node-name" value="出力のみ">
                </div>
                <div class="header-right">
                    <button class="color-dropdown-btn" title="色を変更" style="background-color: #4CAF50;"></button>
                    <button class="delete-btn" title="削除">×</button>
                </div>
            </div>
            <div class="node-options" style="display: none;">
                <div class="color-palette">
                    <button class="color-btn" data-color="#4CAF50" title="緑" style="background-color: #4CAF50;"></button>
                    <button class="color-btn" data-color="#FF9800" title="オレンジ" style="background-color: #FF9800;"></button>
                    <button class="color-btn" data-color="#2196F3" title="青" style="background-color: #2196F3;"></button>
                    <button class="color-btn" data-color="#9C27B0" title="紫" style="background-color: #9C27B0;"></button>
                    <button class="color-btn" data-color="#E91E63" title="ピンク" style="background-color: #E91E63;"></button>
                    <button class="color-btn" data-color="#00BCD4" title="シアン" style="background-color: #00BCD4;"></button>
                    <button class="color-btn" data-color="#795548" title="茶" style="background-color: #795548;"></button>
                    <button class="color-btn" data-color="#607D8B" title="灰青" style="background-color: #607D8B;"></button>
                </div>
            </div>
            <!-- Description Space -->
            <div class="node-description">
                <textarea class="description-input" placeholder="説明を入力..."></textarea>
            </div>
            <!-- Outputs (Sockets) -->
            <div class="sockets-container">
                <div class="socket-port">
                    <input type="text" class="port-label" placeholder="メモ" />
                    <div class="port-type-selector">
                        <span class="port-type-label">-</span>
                        <span class="port-type-arrow">▼</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point output-point"></div>
                        <button class="remove-socket-btn" title="削除">✕</button>
                    </div>
                    <div class="port-type-dropdown"></div>
                </div>
                <button class="add-socket-btn" title="差込口を追加">＋</button>
            </div>
            <div class="resize-handle"></div>
    </template>

    <template id="tpl-power-strip">
        <div class="node power-strip" data-type="strip">
            <!-- Input (Plug) -->
            <div class="plug-container">
                <div class="plug-port" data-plugIndex="0">
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point input-point"></div>
                        <button class="remove-plug-btn" title="削除">✕</button>
                    </div>
                    <input type="text" class="port-label" placeholder="メモ" />
                </div>
                <button class="add-plug-btn" title="プラグを追加">＋</button>
            </div>
            <div class="node-header">
                <div class="header-left">
                    <span class="icon node-icon"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#555"><path d="M326-171q-15-11-22-28l-92-241H40v-80h228l92 244 184-485q7-17 22-28t34-11q19 0 34 11t22 28l92 241h172v80H692l-92-244-184 485q-7 17-22 28t-34 11q-19 0-34-11Z"/></svg></span>
                    <input type="text" class="node-name" value="入力と出力">
                </div>
                <div class="header-right">
                    <button class="color-dropdown-btn" title="色を変更" style="background-color: #FF9800;"></button>
                    <button class="delete-btn" title="削除">×</button>
                </div>
            </div>
            <div class="node-options" style="display: none;">
                <div class="color-palette">
                    <button class="color-btn" data-color="#4CAF50" title="緑" style="background-color: #4CAF50;"></button>
                    <button class="color-btn" data-color="#FF9800" title="オレンジ" style="background-color: #FF9800;"></button>
                    <button class="color-btn" data-color="#2196F3" title="青" style="background-color: #2196F3;"></button>
                    <button class="color-btn" data-color="#9C27B0" title="紫" style="background-color: #9C27B0;"></button>
                    <button class="color-btn" data-color="#E91E63" title="ピンク" style="background-color: #E91E63;"></button>
                    <button class="color-btn" data-color="#00BCD4" title="シアン" style="background-color: #00BCD4;"></button>
                    <button class="color-btn" data-color="#795548" title="茶" style="background-color: #795548;"></button>
                    <button class="color-btn" data-color="#607D8B" title="灰青" style="background-color: #607D8B;"></button>
                </div>
            </div>
            <!-- Description Space -->
            <div class="node-description">
                <textarea class="description-input" placeholder="説明を入力..."></textarea>
            </div>
            <!-- Outputs (Sockets) -->
            <div class="sockets-container">
                <div class="socket-port">
                    <input type="text" class="port-label" placeholder="メモ" />
                    <div class="port-type-selector">
                        <span class="port-type-label">-</span>
                        <span class="port-type-arrow">▼</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point output-point"></div>
                        <button class="remove-socket-btn" title="削除">✕</button>
                    </div>
                    <div class="port-type-dropdown"></div>
                </div>
                <div class="socket-port">
                    <input type="text" class="port-label" placeholder="メモ" />
                    <div class="port-type-selector">
                        <span class="port-type-label">-</span>
                        <span class="port-type-arrow">▼</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point output-point"></div>
                        <button class="remove-socket-btn" title="削除">✕</button>
                    </div>
                    <div class="port-type-dropdown"></div>
                </div>
                <div class="socket-port">
                    <input type="text" class="port-label" placeholder="メモ" />
                    <div class="port-type-selector">
                        <span class="port-type-label">-</span>
                        <span class="port-type-arrow">▼</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point output-point"></div>
                        <button class="remove-socket-btn" title="削除">✕</button>
                    </div>
                    <div class="port-type-dropdown"></div>
                </div>
                <button class="add-socket-btn" title="差込口を追加">＋</button>
            </div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <template id="tpl-device">
        <div class="node device" data-type="device">
            <!-- Input (Plug) -->
            <div class="plug-container">
                <div class="plug-port" data-plugIndex="0">
                    <div style="display: flex; align-items: center; gap: 2px;">
                        <div class="port-point input-point"></div>
                        <button class="remove-plug-btn" title="削除">✕</button>
                    </div>
                    <input type="text" class="port-label" placeholder="メモ" />
                </div>
                <button class="add-plug-btn" title="プラグを追加">＋</button>
            </div>
            <div class="node-header">
                <div class="header-left">
                    <span class="icon node-icon"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#555"><path d="M780-380q-31 0-56-17t-36-43H80v-80h608q11-26 36-43t56-17q42 0 71 29t29 71q0 42-29 71t-71 29Z"/></svg></span>
                    <input type="text" class="node-name" value="入力のみ">
                </div>
                <div class="header-right">
                    <button class="color-dropdown-btn" title="色を変更" style="background-color: #2196F3;"></button>
                    <button class="delete-btn" title="削除">×</button>
                </div>
            </div>
            <div class="node-options" style="display: none;">
                <div class="color-palette">
                    <button class="color-btn" data-color="#4CAF50" title="緑" style="background-color: #4CAF50;"></button>
                    <button class="color-btn" data-color="#FF9800" title="オレンジ" style="background-color: #FF9800;"></button>
                    <button class="color-btn" data-color="#2196F3" title="青" style="background-color: #2196F3;"></button>
                    <button class="color-btn" data-color="#9C27B0" title="紫" style="background-color: #9C27B0;"></button>
                    <button class="color-btn" data-color="#E91E63" title="ピンク" style="background-color: #E91E63;"></button>
                    <button class="color-btn" data-color="#00BCD4" title="シアン" style="background-color: #00BCD4;"></button>
                    <button class="color-btn" data-color="#795548" title="茶" style="background-color: #795548;"></button>
                    <button class="color-btn" data-color="#607D8B" title="灰青" style="background-color: #607D8B;"></button>
                </div>
            </div>
            <!-- Description Space -->
            <div class="node-description">
                <textarea class="description-input" placeholder="説明を入力..."></textarea>
            </div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <!-- スクリプト読み込み順（依存関係に基づく） -->
    <script src="port-data.js"></script>     <!-- ポート型データ定義（最初に読み込む） -->
    <script src="config.js"></script>        <!-- グローバル変数・定数 -->
    <script src="utils.js"></script>         <!-- ユーティリティ関数 -->
    <script src="cable.js"></script>         <!-- ケーブル接続管理 -->
    <script src="port.js"></script>          <!-- ポート型ドロップダウン -->
    <script src="node.js"></script>          <!-- ノード管理（port.js に依存） -->
    <script src="ui.js"></script>            <!-- UI操作（node.jsに依存） -->
    <script src="zoom-pan.js"></script>      <!-- ズーム・パンニング -->
    <script src="storage.js"></script>       <!-- ストレージ操作（全関数に依存） -->
    <script src="main.js"></script>          <!-- メイン初期化（全関数に依存） -->
</body>
</html>
